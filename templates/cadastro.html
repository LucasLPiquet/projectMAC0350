<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    <script src="/static/cadastro.js"></script>
    <link rel="stylesheet" href="/static/stylecadastro.css">
</head>
<body>
    <div class="container">

        <img class="background" src="/static/cadastro imagem.png">

        <form>
            <img id="titulo" src="/static/cadastro_titulo.png">

            <div id="loginbox">
                <input type="text" id="nome" placeholder="Nome">
                <input type="password" id="senha" placeholder="Senha">

                <div id="botoes_cadastro">
                    <button type="button" id="botao-voltar" onclick="window.location.href='/'">Voltar para Login</button>
                    <button type="button" id="botao-salvar" onclick="enviarUsuario()">Cadastrar</button>
                </div>
            </div>
        </form>

    </div>
</body>
</html>
